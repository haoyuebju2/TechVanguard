<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数码新品参数时间线</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                        neutral: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .timeline-line {
                content: '';
                position: absolute;
                left: 50%;
                top: 0;
                transform: translateX(-50%);
                width: 4px;
                height: 100%;
                background: linear-gradient(to bottom, #3b82f6 0%, #8b5cf6 100%);
            }
            .timeline-dot {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: white;
                border: 4px solid #3b82f6;
                z-index: 10;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            .category-badge {
                @apply px-3 py-1 rounded-full text-xs font-semibold;
            }
            .phone-badge {
                @apply bg-blue-100 text-blue-800;
            }
            .laptop-badge {
                @apply bg-purple-100 text-purple-800;
            }
            .tablet-badge {
                @apply bg-green-100 text-green-800;
            }
            .peripheral-badge {
                @apply bg-orange-100 text-orange-800;
            }
            .loading-spinner {
                border: 3px solid #f3f3f3;
                border-top: 3px solid #3b82f6;
                border-radius: 50%;
                width: 30px;
                height: 30px;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fa fa-microchip text-primary text-3xl"></i>
                    <h1 class="text-3xl font-bold text-neutral">数码新品参数时间线</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="all">全部品类</option>
                        <option value="phone">手机</option>
                        <option value="laptop">笔记本电脑</option>
                        <option value="tablet">平板</option>
                        <option value="peripheral">外设</option>
                    </select>
                    <select id="dateFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="all">全部日期</option>
                    </select>
                </div>
            </div>
            <p class="text-gray-600 mt-2">每日更新最新数码产品发布信息，包含手机、电脑、平板、外设等全品类参数</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">累计产品总数</p>
                        <p class="text-3xl font-bold text-neutral mt-1" id="totalCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-calendar-check-o text-primary text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">手机类</p>
                        <p class="text-3xl font-bold text-neutral mt-1" id="phoneCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-mobile text-blue-600 text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">电脑/平板类</p>
                        <p class="text-3xl font-bold text-neutral mt-1" id="laptopCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-laptop text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">外设类</p>
                        <p class="text-3xl font-bold text-neutral mt-1" id="peripheralCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-keyboard-o text-orange-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="flex justify-center py-8">
            <div class="loading-spinner"></div>
        </div>

        <!-- Timeline Container -->
        <div id="timelineContainer" class="relative hidden">
            <div class="timeline-line"></div>
            <!-- Products will be inserted here -->
        </div>

        <!-- Load More / End Message -->
        <div id="loadMoreTrigger" class="flex justify-center py-8 hidden">
            <div class="loading-spinner"></div>
        </div>
        
        <div id="endMessage" class="text-center py-8 text-gray-500 hidden">
            <i class="fa fa-check-circle text-green-500 text-xl mr-2"></i>
            已加载全部产品
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="text-center py-8 text-red-500 hidden">
            <i class="fa fa-exclamation-circle text-xl mr-2"></i>
            <span id="errorText">加载失败</span>
            <button onclick="loadProducts()" class="ml-2 text-primary hover:underline">重试</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center text-gray-600">
                <p>📱 数码新品参数时间线 - 每日18:00自动更新</p>
                <p class="text-sm mt-2">数据来源：中关村在线、京东、IT之家、数码博主公开信息</p>
            </div>
        </div>
    </footer>

    <script>
        // API 配置 - 根据当前端口自动选择
        const API_BASE = window.location.port === '6000' || window.location.port === '' ? '' : `http://110.40.139.245:6000`;
        
        // 状态管理
        let currentPage = 1;
        let perPage = 20;
        let isLoading = false;
        let hasMore = true;
        let allProducts = [];
        let filteredProducts = [];
        
        // DOM 元素
        const timelineContainer = document.getElementById('timelineContainer');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const loadMoreTrigger = document.getElementById('loadMoreTrigger');
        const endMessage = document.getElementById('endMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const categoryFilter = document.getElementById('categoryFilter');
        const dateFilter = document.getElementById('dateFilter');

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        // 格式化时间
        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 获取状态标签
        function getStatusBadge(status) {
            const statusMap = {
                '在售': '<span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">在售</span>',
                '预售': '<span class="px-2 py-1 bg-yellow-100 text-yellow-800 text-xs rounded-full">预售</span>',
                '预约中': '<span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">预约中</span>',
                '爆料': '<span class="px-2 py-1 bg-purple-100 text-purple-800 text-xs rounded-full">爆料</span>'
            };
            return statusMap[status] || `<span class="px-2 py-1 bg-gray-100 text-gray-800 text-xs rounded-full">${status}</span>`;
        }

        // 获取品类标签
        function getCategoryBadge(category) {
            const categoryMap = {
                'phone': '<span class="category-badge phone-badge">手机</span>',
                'laptop': '<span class="category-badge laptop-badge">笔记本</span>',
                'tablet': '<span class="category-badge tablet-badge">平板</span>',
                'peripheral': '<span class="category-badge peripheral-badge">外设</span>'
            };
            return categoryMap[category] || '';
        }

        // 渲染产品卡片
        function renderProductCard(product, isLeft) {
            const alignClass = isLeft ? 'md:pr-12 md:text-right' : 'md:pl-12';
            const params = product.parameters || {};
            
            let paramsHtml = '';
            for (const [key, value] of Object.entries(params)) {
                const icons = {
                    'chip': 'fa-microchip',
                    'screen': 'fa-desktop',
                    'battery': 'fa-battery-three-quarters',
                    'memory': 'fa-memory',
                    'storage': 'fa-hdd-o',
                    'price': 'fa-tag',
                    'refresh_rate': 'fa-tachometer',
                    'power': 'fa-bolt',
                    'design': 'fa-paint-brush'
                };
                const icon = icons[key] || 'fa-cog';
                paramsHtml += `
                    <div class="flex items-start ${isLeft ? 'md:flex-row-reverse' : ''}">
                        <i class="fa ${icon} text-primary mt-1 mr-3 w-4 text-center"></i>
                        <span>${value}</span>
                    </div>
                `;
            }

            return `
                <div class="bg-white rounded-xl shadow-sm p-6 card-hover" data-category="${product.category}" data-date="${product.release_date.split('T')[0]}">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            ${getCategoryBadge(product.category)}
                            <h3 class="text-xl font-bold text-neutral mt-2">${product.brand} ${product.name}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-sm text-gray-500">${formatTime(product.release_date)}</span>
                            <div class="mt-1">
                                ${getStatusBadge(product.status)}
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3 text-gray-700 ${alignClass}">
                        ${paramsHtml}
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <div class="flex items-center text-sm text-gray-500">
                            <i class="fa fa-link mr-2"></i>
                            <span>信息来源：${product.source}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 按日期分组渲染产品
        function renderProducts(products) {
            if (products.length === 0) {
                timelineContainer.innerHTML = '<div class="text-center py-12 text-gray-500">暂无产品数据</div>';
                return;
            }

            // 按日期分组
            const grouped = {};
            products.forEach(product => {
                const date = product.release_date.split('T')[0];
                if (!grouped[date]) {
                    grouped[date] = [];
                }
                grouped[date].push(product);
            });

            // 按日期倒序排列
            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

            let html = '';
            let globalIndex = 0;
            
            sortedDates.forEach(date => {
                const productsInDate = grouped[date];
                
                html += `
                    <div class="mb-16" data-date="${date}">
                        <div class="relative mb-12">
                            <div class="timeline-dot"></div>
                            <div class="absolute left-1/2 transform -translate-x-1/2 -top-10 bg-white px-6 py-2 rounded-full shadow-sm border border-gray-200">
                                <span class="font-semibold text-neutral">${formatDate(date)}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                `;

                productsInDate.forEach((product, idx) => {
                    const isLeft = idx % 2 === 0;
                    html += `
                        <div class="${isLeft ? 'md:pr-12' : 'md:pl-12'}">
                            ${renderProductCard(product, isLeft)}
                        </div>
                    `;
                });

                html += '</div></div>';
                globalIndex++;
            });

            timelineContainer.innerHTML = html;
        }

        // 更新统计
        function updateStats(products) {
            const total = products.length;
            const phone = products.filter(p => p.category === 'phone').length;
            const laptop = products.filter(p => p.category === 'laptop').length;
            const tablet = products.filter(p => p.category === 'tablet').length;
            const peripheral = products.filter(p => p.category === 'peripheral').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('phoneCount').textContent = phone;
            document.getElementById('laptopCount').textContent = laptop + tablet;
            document.getElementById('peripheralCount').textContent = peripheral;
        }

        // 从API加载数据
        async function loadProducts(reset = false) {
            if (isLoading) return;
            
            if (reset) {
                currentPage = 1;
                allProducts = [];
                hasMore = true;
            }

            isLoading = true;
            loadingSpinner.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            endMessage.classList.add('hidden');

            try {
                const category = categoryFilter.value;
                const date = dateFilter.value;
                
                const url = `${API_BASE}/api/products?page=${currentPage}&per_page=${perPage}${category !== 'all' ? '&category=' + category : ''}${date !== 'all' ? '&date=' + date : ''}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (reset) {
                    allProducts = data.products || [];
                } else {
                    allProducts = [...allProducts, ...(data.products || [])];
                }

                const pagination = data.pagination || {};
                hasMore = pagination.page < pagination.total_pages;
                
                // 渲染
                renderProducts(allProducts);
                updateStats(allProducts);
                
                // 显示时间线
                timelineContainer.classList.remove('hidden');

                // 显示加载更多或结束
                if (hasMore) {
                    loadMoreTrigger.classList.remove('hidden');
                    endMessage.classList.add('hidden');
                } else {
                    loadMoreTrigger.classList.add('hidden');
                    endMessage.classList.remove('hidden');
                }

            } catch (error) {
                console.error('Load error:', error);
                errorText.textContent = error.message || '加载失败';
                errorMessage.classList.remove('hidden');
            } finally {
                isLoading = false;
                loadingSpinner.classList.add('hidden');
            }
        }

        // 加载日期筛选选项
        async function loadDateOptions() {
            try {
                const response = await fetch(`${API_BASE}/api/dates`);
                const data = await response.json();
                
                const dates = data.dates || [];
                let html = '<option value="all">全部日期</option>';
                dates.forEach(date => {
                    html += `<option value="${date}">${formatDate(date)}</option>`;
                });
                dateFilter.innerHTML = html;
            } catch (error) {
                console.error('Load dates error:', error);
            }
        }

        // 无限滚动
        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && hasMore && !isLoading) {
                        currentPage++;
                        loadProducts(false);
                    }
                });
            }, { threshold: 0.1 });

            observer.observe(loadMoreTrigger);
        }

        // 筛选变化
        categoryFilter.addEventListener('change', () => loadProducts(true));
        dateFilter.addEventListener('change', () => loadProducts(true));

        // 初始化
        async function init() {
            await loadDateOptions();
            await loadProducts(true);
            setupInfiniteScroll();
        }

        init();
    </script>
</body>
</html>
