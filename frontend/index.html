<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数码新品参数时间线</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                        neutral: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .timeline-line {
                content: '';
                position: absolute;
                left: 50%;
                top: 0;
                transform: translateX(-50%);
                width: 4px;
                height: 100%;
                background: linear-gradient(to bottom, #3b82f6 0%, #8b5cf6 100%);
            }
            .timeline-dot {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: white;
                border: 4px solid #3b82f6;
                z-index: 10;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            .category-badge {
                @apply px-3 py-1 rounded-full text-xs font-semibold;
            }
            .phone-badge {
                @apply bg-blue-100 text-blue-800;
            }
            .laptop-badge {
                @apply bg-purple-100 text-purple-800;
            }
            .tablet-badge {
                @apply bg-green-100 text-green-800;
            }
            .peripheral-badge {
                @apply bg-orange-100 text-orange-800;
            }
            .skeleton {
                animation: skeleton-loading 1.5s linear infinite alternate;
            }
            @keyframes skeleton-loading {
                0% {
                    background-color: hsl(200, 20%, 80%);
                }
                100% {
                    background-color: hsl(200, 20%, 95%);
                }
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center space-x-3">
                    <i class="fa fa-microchip text-primary text-3xl"></i>
                    <h1 class="text-3xl font-bold text-neutral">数码新品参数时间线</h1>
                </div>
                <div class="flex flex-wrap gap-4">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="搜索产品名称、品牌..." 
                               class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent w-full md:w-64">
                        <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                    <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="all">全部品类</option>
                    </select>
                    <select id="dateFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="all">全部日期</option>
                    </select>
                </div>
            </div>
            <p class="text-gray-600 mt-2">每日更新最新数码产品发布信息，包含手机、电脑、平板、外设等全品类参数</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12" id="statsContainer">
            <!-- Skeleton loaders -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div class="w-3/4">
                        <div class="h-4 bg-gray-200 rounded skeleton mb-2 w-2/3"></div>
                        <div class="h-8 bg-gray-200 rounded skeleton w-1/2"></div>
                    </div>
                    <div class="w-12 h-12 bg-gray-200 rounded-full skeleton"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div class="w-3/4">
                        <div class="h-4 bg-gray-200 rounded skeleton mb-2 w-2/3"></div>
                        <div class="h-8 bg-gray-200 rounded skeleton w-1/2"></div>
                    </div>
                    <div class="w-12 h-12 bg-gray-200 rounded-full skeleton"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div class="w-3/4">
                        <div class="h-4 bg-gray-200 rounded skeleton mb-2 w-2/3"></div>
                        <div class="h-8 bg-gray-200 rounded skeleton w-1/2"></div>
                    </div>
                    <div class="w-12 h-12 bg-gray-200 rounded-full skeleton"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div class="w-3/4">
                        <div class="h-4 bg-gray-200 rounded skeleton mb-2 w-2/3"></div>
                        <div class="h-8 bg-gray-200 rounded skeleton w-1/2"></div>
                    </div>
                    <div class="w-12 h-12 bg-gray-200 rounded-full skeleton"></div>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="relative" id="timelineContainer">
            <div class="timeline-line"></div>
            <div id="timelineContent">
                <!-- Loading skeleton -->
                <div class="mb-16">
                    <div class="relative mb-12">
                        <div class="timeline-dot"></div>
                        <div class="absolute left-1/2 transform -translate-x-1/2 -top-10 bg-white px-6 py-2 rounded-full shadow-sm border border-gray-200 w-40 h-8 skeleton"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-8 md:pr-12">
                            <div class="bg-white rounded-xl shadow-sm p-6 h-64 skeleton"></div>
                            <div class="bg-white rounded-xl shadow-sm p-6 h-64 skeleton"></div>
                        </div>
                        <div class="space-y-8 md:pl-12 md:mt-16">
                            <div class="bg-white rounded-xl shadow-sm p-6 h-64 skeleton"></div>
                            <div class="bg-white rounded-xl shadow-sm p-6 h-64 skeleton"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Load More Button -->
        <div class="text-center mt-12" id="loadMoreContainer" style="display: none;">
            <button id="loadMoreBtn" class="px-8 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors font-semibold">
                <i class="fa fa-refresh mr-2"></i>加载更多
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center text-gray-600">
                <p>📱 数码新品参数时间线 - 每日18:00自动更新</p>
                <p class="text-sm mt-2">数据来源：中关村在线、京东、IT之家、数码博主公开信息</p>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let totalPages = 1;
        let isLoading = false;

        // 分类图标映射
        const categoryIcons = {
            'phone': 'fa-mobile',
            'laptop': 'fa-laptop',
            'tablet': 'fa-tablet',
            'peripheral': 'fa-keyboard-o'
        };

        const categoryColors = {
            'phone': 'blue',
            'laptop': 'purple',
            'tablet': 'green',
            'peripheral': 'orange'
        };

        const statusColors = {
            '预约中': 'green',
            '爆料': 'yellow',
            '在售': 'blue',
            '海外上市': 'purple',
            '开发中': 'gray'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadDates();
            await loadStats();
            await loadProducts();
            
            // 绑定事件
            document.getElementById('categoryFilter').addEventListener('change', reloadProducts);
            document.getElementById('dateFilter').addEventListener('change', reloadProducts);
            document.getElementById('searchInput').addEventListener('input', debounce(reloadProducts, 500));
            document.getElementById('loadMoreBtn').addEventListener('click', loadMoreProducts);
        });

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                const data = await res.json();
                const select = document.getElementById('categoryFilter');
                
                data.categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.name;
                    option.textContent = getCategoryName(cat.name);
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load categories:', error);
            }
        }

        // 加载日期
        async function loadDates() {
            try {
                const res = await fetch(`${API_BASE}/dates`);
                const data = await res.json();
                const select = document.getElementById('dateFilter');
                
                data.dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = formatDate(date);
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load dates:', error);
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                
                const statsHtml = `
                    <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">产品总数</p>
                                <p class="text-3xl font-bold text-neutral mt-1">${data.total}</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <i class="fa fa-database text-primary text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">手机类</p>
                                <p class="text-3xl font-bold text-neutral mt-1">${data.category_counts.phone || 0}</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <i class="fa fa-mobile text-blue-600 text-2xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">电脑/平板类</p>
                                <p class="text-3xl font-bold text-neutral mt-1">${(data.category_counts.laptop || 0) + (data.category_counts.tablet || 0)}</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                <i class="fa fa-laptop text-purple-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">外设类</p>
                                <p class="text-3xl font-bold text-neutral mt-1">${data.category_counts.peripheral || 0}</p>
                            </div>
                            <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                                <i class="fa fa-keyboard-o text-orange-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('statsContainer').innerHTML = statsHtml;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // 加载产品
        async function loadProducts(page = 1, append = false) {
            if (isLoading) return;
            isLoading = true;
            
            const category = document.getElementById('categoryFilter').value;
            const date = document.getElementById('dateFilter').value;
            const search = document.getElementById('searchInput').value.trim();
            
            try {
                const params = new URLSearchParams({
                    page,
                    per_page: 10,
                    category,
                    date,
                    search
                });
                
                const res = await fetch(`${API_BASE}/products?${params}`);
                const data = await res.json();
                
                totalPages = data.pagination.total_pages;
                
                if (append) {
                    appendProducts(data.products);
                } else {
                    renderProducts(data.products);
                }
                
                // 控制加载更多按钮显示
                document.getElementById('loadMoreContainer').style.display = 
                    page < totalPages ? 'block' : 'none';
                    
            } catch (error) {
                console.error('Failed to load products:', error);
            } finally {
                isLoading = false;
            }
        }

        // 渲染产品
        function renderProducts(products) {
            if (products.length === 0) {
                document.getElementById('timelineContent').innerHTML = `
                    <div class="text-center py-20">
                        <i class="fa fa-inbox text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 text-lg">暂无产品数据</p>
                    </div>
                `;
                return;
            }
            
            // 按日期分组
            const productsByDate = groupByDate(products);
            let html = '';
            
            Object.keys(productsByDate).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
                const dateProducts = productsByDate[date];
                const leftProducts = dateProducts.filter((_, i) => i % 2 === 0);
                const rightProducts = dateProducts.filter((_, i) => i % 2 === 1);
                
                html += `
                    <div class="mb-16">
                        <div class="relative mb-12">
                            <div class="timeline-dot"></div>
                            <div class="absolute left-1/2 transform -translate-x-1/2 -top-10 bg-white px-6 py-2 rounded-full shadow-sm border border-gray-200">
                                <span class="font-semibold text-neutral">${formatDate(date)}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-8 md:pr-12">
                                ${leftProducts.map(productToHtml).join('')}
                            </div>
                            <div class="space-y-8 md:pl-12 md:mt-16">
                                ${rightProducts.map(productToHtml).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('timelineContent').innerHTML = html;
        }

        // 追加产品
        function appendProducts(products) {
            const productsByDate = groupByDate(products);
            let html = '';
            
            Object.keys(productsByDate).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
                const dateProducts = productsByDate[date];
                const leftProducts = dateProducts.filter((_, i) => i % 2 === 0);
                const rightProducts = dateProducts.filter((_, i) => i % 2 === 1);
                
                html += `
                    <div class="mb-16">
                        <div class="relative mb-12">
                            <div class="timeline-dot"></div>
                            <div class="absolute left-1/2 transform -translate-x-1/2 -top-10 bg-white px-6 py-2 rounded-full shadow-sm border border-gray-200">
                                <span class="font-semibold text-neutral">${formatDate(date)}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-8 md:pr-12">
                                ${leftProducts.map(productToHtml).join('')}
                            </div>
                            <div class="space-y-8 md:pl-12 md:mt-16">
                                ${rightProducts.map(productToHtml).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('timelineContent').insertAdjacentHTML('beforeend', html);
        }

        // 产品转HTML
        function productToHtml(product) {
            const color = categoryColors[product.category] || 'gray';
            const statusColor = statusColors[product.status] || 'gray';
            
            const paramsHtml = Object.entries(product.parameters).map(([key, value]) => `
                <div class="flex items-start">
                    <i class="fa fa-${getParamIcon(key)} text-primary mt-1 mr-3 w-4 text-center"></i>
                    <span>${value}</span>
                </div>
            `).join('');
            
            return `
                <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <span class="category-badge ${product.category}-badge mb-2 inline-block">${getCategoryName(product.category)}</span>
                            <h3 class="text-xl font-bold text-neutral">${product.brand} ${product.name}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-sm text-gray-500">${formatTime(product.release_date)}</span>
                            <div class="mt-1">
                                <span class="px-2 py-1 bg-${statusColor}-100 text-${statusColor}-800 text-xs rounded-full">${product.status}</span>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3 text-gray-700">
                        ${paramsHtml}
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <div class="flex items-center text-sm text-gray-500">
                            <i class="fa fa-link mr-2"></i>
                            <span>信息来源：${product.source}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 辅助函数
        function getCategoryName(category) {
            const names = {
                'phone': '手机',
                'laptop': '笔记本',
                'tablet': '平板',
                'peripheral': '外设'
            };
            return names[category] || category;
        }

        function getParamIcon(key) {
            const icons = {
                'chip': 'microchip',
                'processor': 'microchip',
                'cpu': 'microchip',
                'screen': 'desktop',
                'display': 'desktop',
                'battery': 'battery-three-quarters',
                'price': 'money',
                'release_date': 'calendar',
                'date': 'calendar',
                'camera': 'camera',
                'storage': 'hdd-o',
                'memory': 'memory',
                'ram': 'memory'
            };
            return icons[key] || 'info-circle';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return '今天';
            if (diffDays === 1) return '昨天';
            if (diffDays < 7) return `${diffDays}天前`;
            
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function groupByDate(products) {
            return products.reduce((groups, product) => {
                const date = product.release_date.split('T')[0];
                if (!groups[date]) {
                    groups[date] = [];
                }
                groups[date].push(product);
                return groups;
            }, {});
        }

        function reloadProducts() {
            currentPage = 1;
            loadProducts(1, false);
            loadStats();
        }

        function loadMoreProducts() {
            currentPage++;
            loadProducts(currentPage, true);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
</html>
